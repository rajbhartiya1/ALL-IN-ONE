version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: social_media_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: social_media_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: social_media_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
